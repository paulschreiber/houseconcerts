name: Tests

on:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      RAILS_ENV: test
      DB_HOST: 127.0.0.1

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1.319.0
        with:
          bundler-cache: true

      - name: Cache gems
        uses: actions/cache@v6.1.0
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-test-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-test-

      - name: Install gems
        run: |
          bundle config set path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Set up database
        run: bin/rails db:create db:schema:load

      - name: Run tests
        run: bin/rails test
