upcoming:
  name: "Test Upcoming Show"
  slug: "test-upcoming-show"
  venue: one
  start: <%= 1.month.from_now.change(hour: 19, min: 0, sec: 0).iso8601 %>
  end: <%= (1.month.from_now.change(hour: 19, min: 0, sec: 0) + 2.hours).iso8601 %>
  status: "confirmed"
  price: 20
  blurb: "A test show for fixture data."

past:
  name: "Test Past Show"
  slug: "test-past-show"
  venue: one
  start: <%= 1.month.ago.change(hour: 19, min: 0, sec: 0).iso8601 %>
  end: <%= (1.month.ago.change(hour: 19, min: 0, sec: 0) + 2.hours).iso8601 %>
  status: "confirmed"
  price: 20
  blurb: "A test show that already happened."
